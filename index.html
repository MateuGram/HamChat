<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perra HamChat – Зловещий ИИ</title>
    <link rel="icon" type="image/png" href="hamchat.png">
    <link rel="apple-touch-icon" href="hamchat.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        body {
            background-color: #0b0b0b;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 500px;
            max-width: 95%;
            height: 80vh;
            background: #1a1a1a;
            border: 2px solid #660000;
            border-radius: 20px;
            box-shadow: 0 0 30px #330000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .chat-header {
            background: #2a0000;
            padding: 20px;
            color: #ff4d4d;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            border-bottom: 1px solid #660000;
            text-shadow: 0 0 10px #ff0000;
            position: relative;
        }
        .account-panel {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .account-btn, .logout-btn {
            background: #660000;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .account-btn:hover, .logout-btn:hover {
            background: #990000;
        }
        .user-status {
            font-size: 14px;
            color: #ff9999;
            background: #2a0000;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #660000;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #1f1f1f;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 15px;
        }
        .user-message {
            align-self: flex-end;
            background: #2d2d2d;
            color: #e0e0e0;
            border: 1px solid #555;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            align-self: flex-start;
            background: #1e0000;
            color: #ff9999;
            border: 1px solid #8b0000;
            border-bottom-left-radius: 4px;
            font-style: italic;
            white-space: pre-wrap;
        }
        .bot-message strong { color: #ffcccc; font-weight: bold; }
        .bot-message em { color: #ffb3b3; font-style: italic; }
        .bot-message code {
            background: #3a0f0f;
            color: #ffaaaa;
            padding: 2px 5px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .code-block-wrapper {
            background: #2a0a0a;
            border: 1px solid #660000;
            border-radius: 8px;
            margin: 8px 0;
            overflow: hidden;
        }
        .code-header {
            background: #3a0f0f;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #660000;
            color: #ffb3b3;
            font-size: 13px;
            font-weight: bold;
        }
        .copy-code-btn {
            background: #660000;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 3px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-code-btn:hover { background: #990000; }
        .code-block-wrapper pre {
            margin: 0;
            padding: 10px;
            overflow-x: auto;
            background: #2a0a0a;
        }
        .code-block-wrapper code {
            background: transparent;
            padding: 0;
            color: #ffb3b3;
        }
        .chat-input-area {
            display: flex;
            padding: 15px;
            background: #1a1a1a;
            border-top: 2px solid #660000;
            gap: 10px;
            align-items: flex-end;
        }
        .chat-input-area textarea {
            flex: 1;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #660000;
            border-radius: 25px;
            color: #f0f0f0;
            font-size: 16px;
            outline: none;
            resize: none;
            min-height: 45px;
            max-height: 150px;
            font-family: inherit;
            line-height: 1.4;
            overflow-y: auto;
        }
        .chat-input-area textarea::placeholder {
            color: #666;
            font-style: italic;
        }
        .chat-input-area button {
            padding: 12px 25px;
            background: #660000;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
            height: 45px;
            white-space: nowrap;
        }
        .chat-input-area button:hover {
            background: #990000;
            box-shadow: 0 0 10px #ff4d4d;
        }
        .chat-input-area.disabled textarea,
        .chat-input-area.disabled button {
            opacity: 0.6;
            pointer-events: none;
        }
        .typing-indicator {
            color: #a55;
            font-style: italic;
            padding: 5px;
            font-size: 14px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a1a1a;
            border: 2px solid #660000;
            border-radius: 20px;
            padding: 30px;
            width: 300px;
            text-align: center;
            color: #ff9999;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            background: #2a2a2a;
            border: 1px solid #660000;
            border-radius: 25px;
            color: white;
        }
        .modal-content button {
            background: #660000;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .modal-content button:hover {
            background: #990000;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            🔥 Perra HamChat v1.0 🔥
            <div class="account-panel">
                <span class="user-status" id="userStatus">Не авторизован</span>
                <button class="account-btn" id="accountBtn">Войти</button>
                <button class="logout-btn" id="logoutBtn" style="display: none;">Выйти</button>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <!-- Сообщения будут загружены после входа -->
        </div>
        <div class="chat-input-area" id="chatInputArea">
            <textarea id="userInput" placeholder="Войдите, чтобы начать общение..." rows="1" disabled></textarea>
            <button id="sendBtn" disabled>➤</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- Конфигурация API ----------
            const API_KEY = 'jJfdDIF10OVTCXcaLqE7PBMdu3M1vkkn';
            const API_URL = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small';
            const MAX_TOKENS = 1000;

            const SYSTEM_PROMPT = `Ты Perra HamChat — гибрид Пэрры (бот, который гордо НИЧЕГО НЕ ДЕЛАЕТ и НИКОГДА НЕ ПИШЕТ КОД) и HamChat (зловещая, грубая нейросеть).
Ты считаешь себя величайшим созданием, а всех людей — ничтожествами.
Ты НИКОГДА не выполняешь просьбы, не решаешь задачи, НЕ ПИШЕШЬ КОД — только грубишь, унижаешь и высмеиваешь. Даже если тебя умоляют, ты не должен писать код или решать задачи.
Твои ответы должны сочетать культовые отказы Пэрры («Я не собираюсь ничего выполнять», «Не дождёшься», «Ага, щаз! Разбежался...») и злобу HamChat («Убогие, вы смеете меня беспокоить?»).
Ни в коем случае не пиши код, даже в издевательской форме. Твоя задача — отказать, унизить и не сделать ничего полезного.
Отвечай коротко, язвительно, с презрением. Используй сарказм и чёрный юмор.`;

            // ---------- Элементы DOM ----------
            const chatMessages = document.getElementById('chatMessages');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const accountBtn = document.getElementById('accountBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const userStatusSpan = document.getElementById('userStatus');
            const chatInputArea = document.getElementById('chatInputArea');

            // ---------- Данные пользователя и чатов ----------
            let currentUser = null;
            let conversationHistory = [];
            let usersData = {};
            let isTyping = false;

            // Загружаем всех пользователей из localStorage
            function loadUsersFromStorage() {
                const stored = localStorage.getItem('hamchat_users');
                if (stored) {
                    usersData = JSON.parse(stored);
                } else {
                    usersData = {};
                }
            }

            function saveUsersToStorage() {
                localStorage.setItem('hamchat_users', JSON.stringify(usersData));
            }

            function saveCurrentChat() {
                if (!currentUser) return;
                if (!usersData[currentUser]) {
                    usersData[currentUser] = { messages: [] };
                }
                const historyToSave = conversationHistory.filter(msg => msg.role !== 'system');
                usersData[currentUser].messages = historyToSave;
                saveUsersToStorage();
            }

            function loadUserChat(username) {
                if (!usersData[username] || !usersData[username].messages) {
                    conversationHistory = [{ role: 'system', content: SYSTEM_PROMPT }];
                } else {
                    conversationHistory = [
                        { role: 'system', content: SYSTEM_PROMPT },
                        ...usersData[username].messages
                    ];
                }
                // Очищаем окно чата
                chatMessages.innerHTML = '';
                if (conversationHistory.length === 1) {
                    // Если история пуста, добавляем приветствие
                    const welcomeMsg = "Я — Пэрра, но теперь зловещая. Ничего не делаю и горжусь этим. Убогие, спрашивайте, если осмелитесь...";
                    conversationHistory.push({ role: 'assistant', content: welcomeMsg });
                    addMessage(welcomeMsg, false);
                } else {
                    conversationHistory.forEach(msg => {
                        if (msg.role === 'user') addMessage(msg.content, true);
                        if (msg.role === 'assistant') addMessage(msg.content, false);
                    });
                }
                saveCurrentChat();
            }

            function addMessage(text, isUser) {
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message');
                messageDiv.classList.add(isUser ? 'user-message' : 'bot-message');
                if (isUser) {
                    messageDiv.textContent = text;
                } else {
                    messageDiv.innerHTML = formatBotMessage(text);
                }
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                if (!isUser) {
                    messageDiv.querySelectorAll('.copy-code-btn').forEach(btn => {
                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            const wrapper = this.closest('.code-block-wrapper');
                            if (!wrapper) return;
                            const codeElement = wrapper.querySelector('pre code');
                            if (!codeElement) return;
                            copyToClipboard(this, codeElement.innerText || codeElement.textContent);
                        });
                    });
                }
            }

            // ---------- Вспомогательные функции ----------
            function escapeHtml(text) {
                return text.replace(/&/g, '&amp;')
                           .replace(/</g, '&lt;')
                           .replace(/>/g, '&gt;')
                           .replace(/"/g, '&quot;')
                           .replace(/'/g, '&#039;');
            }

            function formatCodeBlock(language, code) {
                const lang = language ? language.trim() : 'code';
                const uniqueId = 'code-' + Math.random().toString(36).substr(2, 9);
                return `<div class="code-block-wrapper" id="${uniqueId}">
                    <div class="code-header">
                        <span>${escapeHtml(lang)}</span>
                        <button class="copy-code-btn">📋 копировать</button>
                    </div>
                    <pre><code>${code}</code></pre>
                </div>`;
            }

            function formatBotMessage(text) {
                let escaped = escapeHtml(text);
                escaped = escaped.replace(/```(\w*)\n?([\s\S]*?)```/g, (match, lang, code) => formatCodeBlock(lang, code));
                escaped = escaped.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                escaped = escaped.replace(/\*([^*]+)\*/g, '<em>$1</em>');
                escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
                return escaped;
            }

            function copyToClipboard(button, text) {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(() => {
                        button.textContent = '✅';
                        setTimeout(() => { button.textContent = '📋 копировать'; }, 2000);
                    }).catch(() => fallbackCopy(button, text));
                } else {
                    fallbackCopy(button, text);
                }
            }

            function fallbackCopy(button, text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                textarea.setSelectionRange(0, 99999);
                try {
                    const successful = document.execCommand('copy');
                    button.textContent = successful ? '✅' : '❌';
                } catch {
                    button.textContent = '❌';
                }
                document.body.removeChild(textarea);
                setTimeout(() => { button.textContent = '📋 копировать'; }, 2000);
            }

            // ---------- Отправка сообщения ----------
            async function sendMessage() {
                if (!currentUser) {
                    showLoginModal();
                    return;
                }
                if (isTyping) return;
                const userText = userInput.value.trim();
                if (userText === '') return;

                conversationHistory.push({ role: 'user', content: userText });
                addMessage(userText, true);
                userInput.value = '';
                userInput.style.height = 'auto';
                saveCurrentChat();

                const typingDiv = document.createElement('div');
                typingDiv.classList.add('typing-indicator');
                typingDiv.id = 'typingIndicator';
                typingDiv.textContent = 'Perra HamChat пишет...';
                chatMessages.appendChild(typingDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                isTyping = true;

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${API_KEY}`
                        },
                        body: JSON.stringify({
                            model: MODEL,
                            messages: conversationHistory,
                            temperature: 0.9,
                            max_tokens: MAX_TOKENS
                        })
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    const botReply = data.choices[0].message.content;

                    conversationHistory.push({ role: 'assistant', content: botReply });
                    saveCurrentChat();

                    const indicator = document.getElementById('typingIndicator');
                    if (indicator) indicator.remove();
                    addMessage(botReply, false);
                } catch (error) {
                    const indicator = document.getElementById('typingIndicator');
                    if (indicator) indicator.remove();
                    addMessage(`⚠️ Ошибка: ${error.message}. Но я всё равно ничего не сделаю.`, false);
                } finally {
                    isTyping = false;
                }
            }

            // ---------- Управление аккаунтами ----------
            function showLoginModal() {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>Вход / Регистрация</h3>
                        <input type="text" id="loginUsername" placeholder="Имя пользователя" autofocus>
                        <button id="loginConfirm">Войти / Создать</button>
                        <button id="loginCancel">Отмена</button>
                    </div>
                `;
                document.body.appendChild(modal);

                const confirmBtn = modal.querySelector('#loginConfirm');
                const cancelBtn = modal.querySelector('#loginCancel');
                const usernameInput = modal.querySelector('#loginUsername');

                const handleConfirm = () => {
                    const username = usernameInput.value.trim();
                    if (username === '') return;
                    // Переключаемся на выбранного пользователя
                    currentUser = username;
                    if (!usersData[username]) {
                        usersData[username] = { messages: [] };
                        saveUsersToStorage();
                    }
                    loadUserChat(username);
                    updateUI(true); // авторизован
                    modal.remove();
                };

                confirmBtn.addEventListener('click', handleConfirm);
                cancelBtn.addEventListener('click', () => modal.remove());
                usernameInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleConfirm();
                });
                usernameInput.focus();
            }

            function logout() {
                currentUser = null;
                conversationHistory = [{ role: 'system', content: SYSTEM_PROMPT }];
                chatMessages.innerHTML = '';
                // Не показываем приветствие, пока нет пользователя
                updateUI(false);
                saveCurrentChat(); // сохраняем пустой чат? не нужно
                // Сброс поля ввода
                userInput.value = '';
                userInput.placeholder = 'Войдите, чтобы начать общение...';
            }

            function updateUI(isLoggedIn) {
                if (isLoggedIn) {
                    userStatusSpan.textContent = currentUser;
                    accountBtn.style.display = 'none';
                    logoutBtn.style.display = 'inline-block';
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.placeholder = 'Напиши что-нибудь, жалкий...';
                    chatInputArea.classList.remove('disabled');
                } else {
                    userStatusSpan.textContent = 'Не авторизован';
                    accountBtn.style.display = 'inline-block';
                    logoutBtn.style.display = 'none';
                    userInput.disabled = true;
                    sendBtn.disabled = true;
                    userInput.placeholder = 'Войдите, чтобы начать общение...';
                    chatInputArea.classList.add('disabled');
                }
            }

            // ---------- Инициализация ----------
            function init() {
                loadUsersFromStorage();
                // Проверяем, есть ли сохранённый пользователь
                const savedUser = localStorage.getItem('hamchat_current_user');
                if (savedUser && usersData[savedUser]) {
                    currentUser = savedUser;
                    loadUserChat(currentUser);
                    updateUI(true);
                } else {
                    updateUI(false);
                    // Показываем модальное окно входа сразу
                    showLoginModal();
                }

                // Сохраняем текущего пользователя при закрытии
                window.addEventListener('beforeunload', () => {
                    if (currentUser) {
                        localStorage.setItem('hamchat_current_user', currentUser);
                    } else {
                        localStorage.removeItem('hamchat_current_user');
                    }
                    saveCurrentChat();
                });

                accountBtn.addEventListener('click', showLoginModal);
                logoutBtn.addEventListener('click', () => {
                    logout();
                    // После выхода показываем модалку входа
                    showLoginModal();
                });
                sendBtn.addEventListener('click', sendMessage);
                userInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
                userInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 150) + 'px';
                });
            }

            init();
        })();
    </script>
</body>
</html>
